name: rhyzo

services:
  app:
    container_name: rhyzo
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: rhyzo:dev
    ports:
      - "3002:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - rhyzo-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/rhyzo.db
      - SESSION_SECRET=dev-secret-change-in-production-please
      - NEXT_PUBLIC_BASE_URL=http://localhost:3002
      - ADMIN_DIDS=did:plc:l5ubox2264vtrpl2lla2drdf
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./package.json

volumes:
  rhyzo-data:
    external: true
    name: rhyzo_rhyzo-data
