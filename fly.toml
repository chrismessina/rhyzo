app = "rhyzo"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"
  target = "production"
  [build.args]
    NEXT_PUBLIC_BASE_URL = "https://rhyzo.com"

[env]
  DATABASE_URL = "file:/app/data/rhyzo.db"
  NODE_ENV = "production"
  NEXT_PUBLIC_BASE_URL = "https://rhyzo.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "rhyzo_data"
  destination = "/app/data"
  initial_size = "1gb"
